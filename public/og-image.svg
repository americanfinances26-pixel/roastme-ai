<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FF4500" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4500"/>
      <stop offset="60%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Card border -->
  <rect x="20" y="20" width="1160" height="590" rx="24" fill="none" stroke="#FF4500" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- Fire icon -->
  <g transform="translate(565, 72)">
    <path d="M35 5 C35 5 50 22 47 36 C53 28 51 14 51 14 C60 28 56 46 46 55 C48 48 44 42 44 42 C44 53 39 62 35 67 C31 62 27 53 27 42 C27 42 23 48 25 55 C15 46 11 28 20 14 C20 14 18 28 25 36 C20 21 35 5 35 5Z" fill="url(#fire)"/>
  </g>

  <!-- Title -->
  <text x="600" y="222" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="80" font-weight="900" fill="#FFFFFF" letter-spacing="-2">Get Roasted.</text>
  <text x="600" y="318" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="80" font-weight="900" fill="#FF4500" letter-spacing="-2">Get Better.</text>

  <!-- Subtitle — two lines -->
  <text x="600" y="382" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">AI feedback that helps you</text>
  <text x="600" y="418" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#FF4500">communicate better.</text>

  <!-- Score card -->
  <rect x="240" y="456" width="720" height="80" rx="16" fill="#FF450018" stroke="#FF450040" stroke-width="1"/>

  <!-- Left: 2/10 + label stacked -->
  <text x="340" y="496" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="900" fill="#FF4500">2/10</text>
  <text x="340" y="515" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="700" fill="#FF4500">Communication Score</text>

  <!-- Vertical divider -->
  <line x1="430" y1="472" x2="430" y2="520" stroke="#FF450040" stroke-width="1"/>

  <!-- Right: quote, two lines, same vertical centre as 2/10 -->
  <text x="620" y="488" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">"Your CV lists Word as a skill</text>
  <text x="620" y="509" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">in 2026. Your cat types better."</text>

  <!-- ROASTME AI badge -->
  <rect x="450" y="558" width="300" height="38" rx="19" fill="#FF450018" stroke="#FF450040" stroke-width="1"/>
  <text x="600" y="582" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="700" fill="#FF4500">ROASTME AI</text>

</svg>
